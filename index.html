<style>
  :root {
    --album-color: #376392;
    --accent: linear-gradient(135deg, #2B4868, #376392, #6C9AC4);
    --accent-solid: #6C9AC4;
    --accent-light: #CCD8EB;
    --text-dim: #7a8ca8;
    --glow: rgba(108,154,196,0.6);
    --glow-soft: rgba(108,154,196,0.2);
    --gold: #e8c47a;
    --gold-glow: rgba(232,196,122,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:-apple-system,'SF Pro Display','Segoe UI',system-ui,sans-serif;
    background:#0a0a14; color:#fff;
    min-height:100vh; min-height:100dvh;
    display:flex; justify-content:center; align-items:center;
    overflow:hidden; user-select:none; -webkit-user-select:none;
  }

  /* 环境光背景 */
  .ambient-bg { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .ambient-orb { position:absolute; border-radius:50%; filter:blur(90px); opacity:0.18; animation:orbFloat 14s ease-in-out infinite; }
  .ambient-orb:nth-child(1) { width:300px; height:300px; background:#376392; top:-80px; left:-80px; }
  .ambient-orb:nth-child(2) { width:260px; height:260px; background:#2B4868; bottom:-60px; right:-60px; animation-delay:-5s; }
  @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(25px,-25px) scale(1.05);} }

  /* ===== 播放器主体 ===== */
  .player {
    position:relative; z-index:1;
    width:100%; max-width:420px;
    padding:24px 24px 28px;
    display:flex; flex-direction:column; align-items:center;
  }

  /* ===== 封面 + 呼吸光环 ===== */
  .cover-wrapper {
    position:relative; margin-bottom:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }

  /* 单一呼吸光环 */
  .aurora-ring {
    position:absolute;
    width:192px; height:192px;
    border-radius:50%;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    border:1.5px solid rgba(108,154,196,0.2);
    box-shadow:
      0 0 20px rgba(108,154,196,0.15),
      0 0 50px rgba(108,154,196,0.07),
      inset 0 0 20px rgba(108,154,196,0.07);
    pointer-events:none;
    animation:ringBreath 4s ease-in-out infinite;
    transition:box-shadow 0.3s ease;
  }

  @keyframes ringBreath {
    0%,100%{
      opacity:0.35;
      transform:translate(-50%,-50%) scale(1);
      border-color:rgba(108,154,196,0.15);
      box-shadow:0 0 15px rgba(108,154,196,0.12), 0 0 40px rgba(108,154,196,0.05), inset 0 0 15px rgba(108,154,196,0.05);
    }
    50%{
      opacity:0.85;
      transform:translate(-50%,-50%) scale(1.055);
      border-color:rgba(108,154,196,0.35);
      box-shadow:0 0 35px rgba(108,154,196,0.3), 0 0 80px rgba(108,154,196,0.12), inset 0 0 35px rgba(108,154,196,0.1);
    }
  }

  /* 封面主体 */
  .cover {
    width:150px; height:150px; border-radius:50%; object-fit:cover;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.6),
      0 0 60px rgba(108,154,196,0.08);
    animation:spin 20s linear infinite;
    position:relative; z-index:2;
  }
  .cover.paused { animation-play-state:paused; }
  @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }

  /* 封面旋转光斑 — 用伪元素实现，确保跟随封面旋转 */
  .cover-shine {
    display:none;
  }

  .cover::after {
    content:'';
    position:absolute;
    width:45px; height:22px;
    background:radial-gradient(ellipse at 35% 30%, rgba(255,255,255,0.32) 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
    top:6px; left:12px;
    border-radius:50%;
    filter:blur(2px);
    pointer-events:none;
    z-index:3;
  }

  /* ===== 歌曲信息 ===== */
  .song-info { text-align:center; margin-bottom:4px; }
  .song-title { font-size:18px; font-weight:600; letter-spacing:0.5px; }
  .song-artist {
    font-size:12px; font-weight:600; color:var(--text-dim);
    letter-spacing:1.2px;
    text-shadow:0 0 8px rgba(108,154,196,0.3);
  }

  /* ===== 歌词区 ===== */
  .lyrics-section {
    flex:1; width:100%; min-height:160px;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    gap:8px; margin-bottom:6px; position:relative;
    perspective:400px;
  }

  /* 歌词区无额外背景 — 与整体背景融合 */
  .lyrics-section::before { display:none; }

  /* 歌词层 */
  .lyric-prev {
    font-size:14px; font-weight:400; text-align:center;
    color:rgba(255,255,255,0.12);
    transform:perspective(400px) rotateX(18deg) translateY(-8px) scale(0.82);
    transform-origin:center bottom;
    filter:blur(1.5px);
    transition:all 0.8s cubic-bezier(.25,.46,.45,.94);
  }

  .lyric-current {
    font-size:21px; font-weight:700; text-align:center;
    color:#fff; padding:0 16px;
    transform:perspective(400px) rotateX(0deg) translateY(0) scale(1);
    transform-origin:center center;
    transition:all 0.5s cubic-bezier(.25,.46,.45,.94);
    position:relative;
    text-shadow:0 0 20px rgba(108,154,196,0.25);
  }
  /* 高亮歌词背面呼吸光晕 — 紧贴文字的微弱脉动 */
  .lyric-current::before {
    content:'';
    position:absolute;
    inset:-6px -12px -4px -12px;
    background:radial-gradient(ellipse 65% 50% at 50% 55%,
      rgba(108,154,196,0.07) 0%,
      rgba(108,154,196,0.02) 60%,
      transparent 75%
    );
    border-radius:12px;
    filter:blur(4px);
    opacity:0;
    animation:lyricBackGlow 4s ease-in-out infinite;
    z-index:-1;
    pointer-events:none;
  }
  .lyric-current.active::before {
    opacity:1;
  }
  @keyframes lyricBackGlow {
    0%,100% { opacity:0.25; filter:blur(5px); transform:scale(0.97); }
    50% { opacity:0.9; filter:blur(3px); transform:scale(1); }
  }

  .lyric-next {
    font-size:13px; font-weight:300; text-align:center;
    color:rgba(255,255,255,0.08);
    transform:perspective(400px) rotateX(12deg) translateY(8px) scale(0.78);
    transform-origin:center top;
    filter:blur(1px);
    transition:all 0.8s cubic-bezier(.25,.46,.45,.94);
    padding:0 16px;
  }

  /* 歌词字 — 逐字淡入 */
  .lyric-char {
    display:inline-block; opacity:0;
    transform:translateY(12px) scale(0.9);
    transition:opacity 0.4s ease, transform 0.4s cubic-bezier(.34,1.56,.64,1);
    transition-delay:var(--char-delay,0ms);
  }
  .lyric-current.active .lyric-char {
    opacity:1;
    transform:translateY(0) scale(1);
    text-shadow:0 0 16px rgba(108,154,196,0.3);
  }
  .lyric-current.dissolving .lyric-char {
    opacity:0 !important;
    transform:translateY(-10px) scale(0.95) !important;
    transition:all 0.5s cubic-bezier(.4,0,.2,1) !important;
  }

  /* ===== 进度条 ===== */
  .progress-section { width:100%; margin-bottom:10px; }
  .progress-bar {
    position:relative; height:3px;
    background:rgba(255,255,255,0.06); border-radius:3px; cursor:pointer; margin-bottom:6px;
  }
  .progress-fill {
    position:absolute; left:0; top:0; bottom:0;
    background:var(--accent);
    border-radius:3px; width:0%; transition:width 0.08s linear;
    box-shadow:0 0 8px rgba(108,154,196,0.4);
  }
  .progress-thumb {
    position:absolute; top:50%; transform:translate(-50%,-50%) scale(0);
    width:12px; height:12px; background:#fff; border-radius:50%;
    box-shadow:0 0 12px rgba(108,154,196,0.6), 0 2px 6px rgba(0,0,0,0.3);
    transition:transform 0.15s;
  }
  .progress-bar:hover .progress-fill { box-shadow:0 0 14px rgba(108,154,196,0.55); }

  /* ===== 进度条上方呼吸光晕 — 升级版 ===== */
  .progress-glow {
    width:88%; height:6px;
    margin:0 auto 2px;
    background:transparent;
    position:relative;
    pointer-events:none;
  }
  /* 第一层：宽幅柔光底座 */
  .progress-glow::before {
    content:'';
    position:absolute; inset:-8px -10%;
    background:
      radial-gradient(ellipse 80% 100% at 50% 50%,
        rgba(108,154,196,0.18) 0%,
        rgba(100,140,190,0.08) 40%,
        transparent 70%
      );
    animation:progressBreath 4s ease-in-out infinite;
    border-radius:20px;
    filter:blur(3px);
  }
  /* 第二层：核心发光线 */
  .progress-glow::after {
    content:'';
    position:absolute;
    top:2px; left:12%; right:12%;
    height:1.5px;
    border-radius:2px;
    background:linear-gradient(90deg,
      transparent 0%,
      rgba(130,175,220,0.15) 15%,
      rgba(150,195,235,0.55) 35%,
      rgba(180,215,245,0.75) 50%,
      rgba(150,195,235,0.55) 65%,
      rgba(130,175,220,0.15) 85%,
      transparent 100%
    );
    animation:progressLineBreath 4s ease-in-out infinite;
    box-shadow:
      0 0 8px rgba(140,185,230,0.3),
      0 0 24px rgba(120,170,215,0.12),
      0 0 48px rgba(108,154,196,0.05);
    filter:blur(0.2px);
  }
  @keyframes progressBreath {
    0%,100%{ opacity:0.35; transform:scaleX(0.92); filter:blur(4px); }
    50%{ opacity:1; transform:scaleX(1); filter:blur(2px); }
  }
  @keyframes progressLineBreath {
    0%,100%{
      opacity:0.3;
      box-shadow:
        0 0 4px rgba(140,185,230,0.1),
        0 0 12px rgba(120,170,215,0.05);
      background:linear-gradient(90deg,
        transparent 0%,
        rgba(130,175,220,0.06) 15%,
        rgba(150,195,235,0.2) 35%,
        rgba(180,215,245,0.28) 50%,
        rgba(150,195,235,0.2) 65%,
        rgba(130,175,220,0.06) 85%,
        transparent 100%
      );
    }
    50%{
      opacity:1;
      box-shadow:
        0 0 10px rgba(150,195,235,0.4),
        0 0 30px rgba(130,180,225,0.18),
        0 0 56px rgba(108,154,196,0.08);
      background:linear-gradient(90deg,
        transparent 0%,
        rgba(130,175,220,0.2) 15%,
        rgba(155,200,240,0.6) 35%,
        rgba(190,225,250,0.85) 50%,
        rgba(155,200,240,0.6) 65%,
        rgba(130,175,220,0.2) 85%,
        transparent 100%
      );
    }
  }
  .progress-bar:active .progress-thumb { transform:translate(-50%,-50%) scale(1); }
  .time-row { display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); }

  /* ===== 控制按钮 ===== */
  .controls { display:flex; align-items:center; justify-content:center; gap:32px; }
  .ctrl-btn {
    background:none; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    padding:10px; border-radius:50%; transition:transform 0.12s, opacity 0.15s;
  }
  .ctrl-btn:hover svg { opacity:1; }
  .ctrl-btn:active { transform:scale(0.88); }
  .ctrl-btn svg { width:24px; height:24px; fill:rgba(255,255,255,0.5); transition:opacity 0.15s; }
  .ctrl-btn.play-pause {
    width:54px; height:54px;
    background:var(--accent);
    box-shadow:0 4px 20px rgba(54,99,146,0.45), 0 0 0 0 rgba(108,154,196,0);
    border-radius:50%;
    transition:transform 0.15s, box-shadow 0.3s;
  }
  .ctrl-btn.play-pause:hover {
    box-shadow:0 4px 28px rgba(54,99,146,0.6), 0 0 18px rgba(108,154,196,0.2);
  }
  .ctrl-btn.play-pause svg { fill:#fff; width:24px; height:24px; }

  /* ===== 故事编辑器 ===== */
  .story-editor {
    width:100%; margin-top:10px; display:none;
  }
  .story-editor.show { display:block; }
  .story-editor textarea {
    width:100%; padding:8px 14px;
    background:rgba(108,154,196,0.08);
    border:1px solid rgba(108,154,196,0.15);
    border-radius:12px;
    color:#CCD8EB; font-size:13px; font-style:italic;
    outline:none; resize:none;
    font-family:inherit;
    transition:border-color 0.2s;
    box-sizing:border-box;
  }
  .story-editor textarea:focus {
    border-color:rgba(108,154,196,0.4);
    background:rgba(108,154,196,0.12);
  }
  .story-editor textarea::placeholder {
    color:rgba(204,216,235,0.25);
  }

  /* ===== 分享卡按钮 ===== */
  .share-btn {
    margin-top:20px;
    padding:12px 28px;
    background:rgba(108,154,196,0.15);
    border:1px solid rgba(108,154,196,0.3);
    border-radius:25px;
    color:#CCD8EB;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    transition:all 0.2s;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .share-btn:hover {
    background:rgba(108,154,196,0.25);
    border-color:rgba(108,154,196,0.5);
    transform:translateY(-2px);
    box-shadow:0 4px 16px rgba(108,154,196,0.2);
  }
  .share-btn svg {
    width:16px; height:16px;
    fill:currentColor;
  }

  /* ===== 歌词切换柔和光效 ===== */
  @keyframes lyricFadeIn {
    0%{opacity:0; transform:translateY(8px) scale(0.97);}
    100%{opacity:1; transform:translateY(0) scale(1);}
  }

  @media (min-width:500px) and (min-height:750px) {
    .cover { width:200px; height:200px; }
    .aurora-ring { width:260px; height:260px; }
    .aurora-ring-2 { width:260px; height:260px; }
    .song-title { font-size:20px; }
    .lyrics-section { min-height:200px; }
    .lyric-current { font-size:24px; }
  }
</style>
</head>

const playBtn = document.getElementById('playBtn');
const iconPlay = document.getElementById('iconPlay');
const iconPause = document.getElementById('iconPause');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const progressThumb = document.getElementById('progressThumb');
const timeCurrent = document.getElementById('timeCurrent');
const timeTotal = document.getElementById('timeTotal');
const albumCover = document.getElementById('albumCover');
const lyricPrev = document.getElementById('lyricPrev');
const lyricCurrent = document.getElementById('lyricCurrent');
const lyricNext = document.getElementById('lyricNext');
const lyricsSection = document.getElementById('lyricsSection');

let currentLineIndex = -1;
let isPlaying = false;

function togglePlay() { isPlaying ? pause() : play(); }

/* 歌词逻辑 */
function findLine(time) {
  if (time < lyricsData[0].t) return -1;
  for (let i = lyricsData.length - 1; i >= 0; i--) {
    if (time >= lyricsData[i].t) return i;
  }
  return -1;
}

function renderLine(text) {
  lyricCurrent.innerHTML = '';
  lyricCurrent.classList.remove('dissolving');
  text.split('').forEach((char, i) => {
    const span = document.createElement('span');
    span.className = 'lyric-char';
    span.textContent = char;
    span.style.setProperty('--char-delay', `${i * 55}ms`);
    lyricCurrent.appendChild(span);
  });
  requestAnimationFrame(() => lyricCurrent.classList.add('active'));
}

function switchLine(newIdx) {
  if (newIdx === currentLineIndex) return;

  if (currentLineIndex >= 0) {
    lyricCurrent.classList.add('dissolving');
    lyricCurrent.classList.remove('active');
  }

  currentLineIndex = newIdx;

  setTimeout(() => {
    renderLine(lyricsData[newIdx].l);
    lyricPrev.textContent = newIdx > 0 ? lyricsData[newIdx - 1].l : '';
    lyricNext.textContent = newIdx < lyricsData.length - 1 ? lyricsData[newIdx + 1].l : '';
  }, 320);
}

function play() {
  audio.play().then(() => {
    isPlaying = true;
    iconPlay.style.display = 'none';
    iconPause.style.display = 'block';
    albumCover.classList.remove('paused');
  }).catch(e => console.log('播放失败', e));
}

function pause() {
  audio.pause();
  isPlaying = false;
  iconPlay.style.display = 'block';
  iconPause.style.display = 'none';
  albumCover.classList.add('paused');
}

function fmt(s) {
  return `${Math.floor(s/60)}:${Math.floor(s%60).toString().padStart(2,'0')}`;
}

playBtn.addEventListener('click', () => isPlaying ? pause() : play());
prevBtn.addEventListener('click', () => { audio.currentTime = 0; if (isPlaying) play(); });
nextBtn.addEventListener('click', () => { audio.currentTime = audio.duration; });

audio.addEventListener('loadedmetadata', () => {
  timeTotal.textContent = fmt(audio.duration);
});

audio.addEventListener('timeupdate', () => {
  const pct = (audio.currentTime / audio.duration) * 100 || 0;
  progressFill.style.width = pct + '%';
  progressThumb.style.left = pct + '%';
  timeCurrent.textContent = fmt(audio.currentTime);
  const idx = findLine(audio.currentTime);
  if (idx >= 0 && idx !== currentLineIndex) switchLine(idx);
});

let dragging = false;
progressBar.addEventListener('touchstart', e => { dragging = true; seek(e); }, {passive:true});
progressBar.addEventListener('touchmove', e => { if (dragging) seek(e); }, {passive:true});
progressBar.addEventListener('touchend', () => { dragging = false; });
progressBar.addEventListener('click', e => {
  const r = progressBar.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});

function seek(e) {
  const t = e.touches[0];
  const r = progressBar.getBoundingClientRect();
  audio.currentTime = Math.max(0, Math.min(1, (t.clientX - r.left) / r.width)) * audio.duration;
}

if (savedStory) {
  storyInput.value = savedStory;

// 保存故事文本
storyInput.addEventListener('input', () => {

document.querySelector('.song-info').addEventListener('dblclick', () => {
  storyEditor.classList.toggle('show');
  if (storyEditor.classList.contains('show')) {
    storyInput.focus();
    storyInput.select();
  }
  clearTimeout(storyToggleTimer);
  storyToggleTimer = setTimeout(() => storyEditor.classList.remove('show'), 8000);
});

// 辅助函数：生成标准二维码图片
async function generateQRCodeImage(url, size) {
  return new Promise((resolve, reject) => {
    const tempDiv = document.createElement('div');
    tempDiv.style.position = 'absolute';
    tempDiv.style.left = '-9999px';
    tempDiv.style.top = '-9999px';
    document.body.appendChild(tempDiv);
    
    try {
      new QRCode(tempDiv, {
        text: url,
        width: size,
        height: size,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
      
      setTimeout(() => {
        const img = tempDiv.querySelector('img');
        if (img) {
          if (img.complete) {
            document.body.removeChild(tempDiv);
            resolve(img);
          } else {
            img.onload = () => {
              document.body.removeChild(tempDiv);
              resolve(img);
            };
            img.onerror = () => {
              document.body.removeChild(tempDiv);
              reject(new Error('Failed to load QR code image'));
            };
          }
        } else {
          const canvas = tempDiv.querySelector('canvas');
          if (canvas) {
            const resultImg = new Image();
            resultImg.src = canvas.toDataURL();
            document.body.removeChild(tempDiv);
            resolve(resultImg);
          } else {
            document.body.removeChild(tempDiv);
            reject(new Error('Failed to generate QR code'));
          }
        }
      }, 100);
    } catch (e) {
      document.body.removeChild(tempDiv);
      reject(e);
    }
  });
}

async function generateShareCard() {
  const canvas = document.getElementById('shareCanvas');
  const ctx = canvas.getContext('2d');

  canvas.width = 400;
  canvas.height = 500;

  // ===== 1. 深空背景 =====
  var bgGrad = ctx.createRadialGradient(200, 200, 50, 200, 200, 400);
  bgGrad.addColorStop(0, '#0f1520');
  bgGrad.addColorStop(0.5, '#0a0e17');
  bgGrad.addColorStop(1, '#060810');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, 400, 500);

  // ===== 2. 环境光晕 =====
  var orb1 = ctx.createRadialGradient(80, 50, 10, 80, 50, 180);
  orb1.addColorStop(0, 'rgba(55,99,146,0.15)');
  orb1.addColorStop(0.5, 'rgba(55,99,146,0.06)');
  orb1.addColorStop(1, 'transparent');
  ctx.fillStyle = orb1;
  ctx.fillRect(0, 0, 400, 500);

  var orb2 = ctx.createRadialGradient(350, 450, 10, 350, 450, 200);
  orb2.addColorStop(0, 'rgba(108,154,196,0.12)');
  orb2.addColorStop(0.5, 'rgba(108,154,196,0.04)');
  orb2.addColorStop(1, 'transparent');
  ctx.fillStyle = orb2;
  ctx.fillRect(0, 0, 400, 500);

  // ===== 3. 边框 =====
  ctx.strokeStyle = 'rgba(108,154,196,0.08)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(24, 24, 352, 452);

  // ===== 4. 封面 =====
  var coverSize = 170;
  var coverX = 200;
  var coverY = 120;

  ctx.strokeStyle = 'rgba(108,154,196,0.2)';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = 'rgba(108,154,196,0.3)';
  ctx.shadowBlur = 25;
  ctx.beginPath();
  ctx.arc(coverX, coverY, coverSize/2 + 10, 0, Math.PI * 2);
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 40;
  ctx.shadowOffsetY = 8;

  ctx.save();
  ctx.beginPath();
  ctx.arc(coverX, coverY, coverSize/2, 0, Math.PI * 2);
  ctx.closePath();
  ctx.clip();

  var coverImg = albumCover;
  var ar = coverImg.naturalWidth / coverImg.naturalHeight;
  var dw, dh;
  if (ar > 1) { dh = coverSize; dw = coverSize * ar; }
  else { dw = coverSize; dh = coverSize / ar; }
  ctx.drawImage(coverImg, coverX - dw/2, coverY - dh/2, dw, dh);
  ctx.restore();

  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // ===== 5. 歌曲信息 =====
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 28px -apple-system, "SF Pro Display", sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(108,154,196,0.2)';
  ctx.shadowBlur = 12;
  ctx.fillText('借过一下', 200, 250);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#7a8ca8';
  ctx.font = '500 14px -apple-system, sans-serif';
  ctx.fillText('Cover by Chris', 200, 272);

  // ===== 6. 分隔线 =====
  var lg = ctx.createLinearGradient(120, 0, 280, 0);
  lg.addColorStop(0, 'transparent');
  lg.addColorStop(0.3, 'rgba(108,154,196,0.08)');
  lg.addColorStop(0.5, 'rgba(108,154,196,0.15)');
  lg.addColorStop(0.7, 'rgba(108,154,196,0.08)');
  lg.addColorStop(1, 'transparent');
  ctx.fillStyle = lg;
  ctx.fillRect(120, 292, 160, 1);

  // ===== 7. 故事语（从 input 读取）=====
  var story = storyInput.value.trim();
  if (story) {
    var mid = Math.ceil(story.length / 2);
    var line1 = story.substring(0, mid);
    var line2 = story.substring(mid);
    ctx.fillStyle = 'rgba(204,216,235,0.6)';
    ctx.font = 'italic 13px -apple-system, sans-serif';
    ctx.fillText(line1, 200, 325);
    if (line2) ctx.fillText(line2, 200, 343);
  } else {
    ctx.fillStyle = 'rgba(204,216,235,0.3)';
    ctx.font = 'italic 12px -apple-system, sans-serif';
    ctx.fillText('陈小春 · 借过一下（粤语版）', 200, 334);
  }

  // ===== 8. 真二维码 =====
  var qrSize = 85;
  var qrX = 157;
  var qrY = 375;

  // 白色背景
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(qrX, qrY, qrSize, qrSize);

  // 生成二维码
  var pageUrl = 'https://chrischou1130.github.io/cover/';
  try {
    var qrImg = await generateQRCodeImage(pageUrl, qrSize);
    ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);
  } catch (e) {
    console.error('Failed to generate QR code:', e);
    ctx.fillStyle = '#cccccc';
    ctx.fillRect(qrX, qrY, qrSize, qrSize);
  }

  ctx.fillStyle = 'rgba(204,216,235,0.35)';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('扫码收听完整版', 200, 485);

  // ===== 复制到剪贴板 =====
  canvas.toBlob(async function(blob) {
    try {
      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': blob })
      ]);
      var btn = document.getElementById('shareBtn');
      var origHTML = btn.innerHTML;
      var origBg = btn.style.background;
      var origBorder = btn.style.borderColor;
      btn.innerHTML = '✅ 已复制';
      btn.style.background = 'rgba(108,154,196,0.3)';
      btn.style.borderColor = 'rgba(108,154,196,0.6)';
      setTimeout(function() {
        btn.innerHTML = origHTML;
        btn.style.background = origBg;
        btn.style.borderColor = origBorder;
      }, 2000);
    } catch(err) {
      var link = document.createElement('a');
      link.download = '借过一下_Chris_分享卡.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  });
}

// 圆角矩形辅助函数
function roundRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}
